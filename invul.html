<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000; /* preto absoluto */
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* CONTAINER */
.container {
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;

  opacity: 0;
  transform: translateY(80px);
  animation: entrance 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* LOGO */
.logo {
  width: 85vw;
  max-width: 1000px;

  transition: transform 0.4s ease;
}

/* LINHA */
.line {
  width: 70px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.5;
  transition: 0.4s;
}

/* TEXTO */
.text {
  font-size: 13px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  transition: 0.4s;
}

/* HOVER (bem sutil) */
.container:hover .logo {
  transform: scale(1.02);
}

.container:hover .text {
  letter-spacing: 10px;
  color: #fff;
}

.container:hover .line {
  width: 120px;
}

/* ENTRADA SUAVE */
@keyframes entrance {
  from {
    opacity: 0;
    transform: translateY(100px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">

  <div class="line"></div>

  <div class="text">EM BREVE</div>

</div>

</body>
</html>
