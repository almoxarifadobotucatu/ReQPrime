<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* CENTRALIZAÇÃO ÓPTICA */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(-3%);
  text-align: center;

  opacity: 0;
  animation: entrance 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* LOGO */
.logo {
  width: 85vw;
  max-width: 1000px;

  transition: 
    transform 0.35s cubic-bezier(0.22,1,0.36,1),
    filter 0.35s ease;
}

/* INTERAÇÃO PREMIUM */
.container:hover .logo {
  transform: scale(1.025);

  /* 👇 isso aqui dá sensação premium real */
  filter: brightness(1.15) contrast(1.1);
}

/* LINHA */
.line {
  width: 60px;
  height: 1px;
  margin-top: 14px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.4;
  transition: 0.35s ease;
}

/* TEXTO */
.text {
  font-size: 12px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  transition: 0.35s ease;
}

/* HOVER SUTIL */
.container:hover .text {
  letter-spacing: 7px;
  color: #fff;
}

.container:hover .line {
  width: 90px;
  opacity: 0.8;
}

/* ENTRADA LIMPA */
@keyframes entrance {
  from {
    opacity: 0;
    transform: translateY(60px);
  }
  to {
    opacity: 1;
    transform: translateY(-3%);
  }
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">

  <div class="line"></div>
  <div class="text">EM BREVE</div>

</div>

</body>
</html>
