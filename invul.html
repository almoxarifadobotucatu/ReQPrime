<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* CENTRALIZAÇÃO ÓPTICA (ligeiramente acima do centro real) */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;

  transform: translateY(-3%); /* 👈 ajuste fino visual */
  text-align: center;

  opacity: 0;
  animation: entrance 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* WRAPPER PARA CONTROLAR O SHINE */
.logo-wrapper {
  position: relative;
  display: inline-block;
  overflow: hidden;
}

/* LOGO */
.logo {
  width: 85vw;
  max-width: 1000px;
  display: block;

  transition: transform 0.4s ease;
}

/* SHINE (SÓ NO HOVER) */
.shine {
  position: absolute;
  top: 0;
  left: -120%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform: skewX(-20deg);
  pointer-events: none;
}

/* ativa no hover */
.logo-wrapper:hover .shine {
  animation: shineMove 0.8s ease forwards;
}

/* LINHA */
.line {
  width: 60px;
  height: 1px;
  margin-top: 14px;
  margin-bottom: 10px;

  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.5;
  transition: 0.4s;
}

/* TEXTO */
.text {
  font-size: 12px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  transition: 0.4s;
}

/* HOVER SUAVE */
.container:hover .logo {
  transform: scale(1.025);
}

.container:hover .text {
  letter-spacing: 8px;
  color: #fff;
}

.container:hover .line {
  width: 100px;
}

/* ANIMAÇÕES */
@keyframes entrance {
  from {
    opacity: 0;
    transform: translateY(80px);
  }
  to {
    opacity: 1;
    transform: translateY(-3%);
  }
}

@keyframes shineMove {
  from { left: -120%; }
  to { left: 140%; }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo-wrapper">
    <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">
    <div class="shine"></div>
  </div>

  <div class="line"></div>
  <div class="text">EM BREVE</div>

</div>

</body>
</html>
