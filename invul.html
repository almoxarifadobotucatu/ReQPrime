<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  transform: translateY(-5%);
}

/* LOGO — LIMPA (SEM NADA QUE CAUSE BLUR) */
.logo {
  width: clamp(300px, 82vw, 1000px);

  opacity: 0;
  transform: translateY(40px);

  animation: logoIn 1.2s cubic-bezier(0.22,1,0.36,1) forwards;

  transition: 
    transform 0.35s cubic-bezier(0.22,1,0.36,1),
    filter 0.35s ease;
}

/* LINHA */
.line {
  width: 50px;
  height: 1px;
  margin-top: 16px;
  margin-bottom: 12px;
  background: linear-gradient(90deg, transparent, #fff, transparent);

  opacity: 0;
  transform: scaleX(0.6);

  animation: lineIn 0.8s ease forwards;
  animation-delay: 0.6s;

  transition: 0.4s ease;
}

/* TEXTO */
.text {
  font-size: 12px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  font-weight: 400;

  opacity: 0;
  transform: translateY(10px);

  animation: textIn 0.8s ease forwards;
  animation-delay: 0.9s;

  transition: 0.4s ease;
}

/* HOVER LIMPO (SEM DISTORCER) */
.container:hover .logo {
  transform: translateY(-2px);
  filter: brightness(1.08);
}

.container:hover .line {
  width: 80px;
  opacity: 0.8;
}

.container:hover .text {
  letter-spacing: 8px;
  color: #fff;
}

/* RESPONSIVO */

@media (min-width: 1600px) {
  .logo { width: 900px; }
}

@media (max-width: 1400px) {
  .logo { width: 780px; }
}

@media (max-width: 900px) {
  .logo { width: 70vw; }
  .text { letter-spacing: 5px; }
}

@media (max-width: 600px) {
  .logo { width: 85vw; }
  .text {
    font-size: 11px;
    letter-spacing: 4px;
  }
  .line { width: 40px; }
}

/* ANIMAÇÕES (SEM SCALE = SEM BLUR) */

@keyframes logoIn {
  0% {
    opacity: 0;
    transform: translateY(60px);
  }
  60% {
    opacity: 1;
    transform: translateY(-3px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes lineIn {
  to {
    opacity: 0.6;
    transform: scaleX(1);
  }
}

@keyframes textIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png" alt="INVUL Logo">

  <div class="line"></div>

  <div class="text">EM BREVE</div>

</div>

</body>
</html>
