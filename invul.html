<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVUL</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #000;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px; /* controla distância real */
    }

    .logo {
      width: 420px;
      max-width: 80vw;
      transition: all 0.6s ease;
    }

    /* efeito premium */
    .container:hover .logo {
      transform: scale(1.04);
      filter: brightness(1.15);
    }

    .line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transition: all 0.6s ease;
    }

    .text {
      font-size: 12px;
      letter-spacing: 14px;
      opacity: 0.6;
      text-transform: uppercase;
      font-weight: 300;
      transition: all 0.6s ease;
    }

    /* interação premium */
    .container:hover .text {
      opacity: 1;
      letter-spacing: 18px;
      transform: translateY(-2px);
    }

    .container:hover .line {
      width: 120px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
    }

    /* entrada suave */
    .container {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>
  <div class="container">

    <img src="https://almoxarifadobotucatu.netlify.app/invul.png"/>

    <div class="line"></div>

    <div class="text">EM BREVE</div>

  </div>
</body>
</html>
