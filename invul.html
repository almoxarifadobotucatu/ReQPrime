<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* CONTAINER — CENTRO ÓPTICO */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;

  transform: translateY(-5%);
}

/* LOGO */
.logo {
  width: clamp(320px, 88vw, 1120px);

  opacity: 0;
  transform: translateY(40px) scale(0.96);

  animation: logoIn 1.2s cubic-bezier(0.22,1,0.36,1) forwards;

  transition:
    transform 0.4s cubic-bezier(0.22,1,0.36,1),
    filter 0.4s ease;
}

/* LINHA */
.line {
  width: 50px;
  height: 1px;

  margin-top: 16px;
  margin-bottom: 10px;

  background: linear-gradient(90deg, transparent, #fff, transparent);

  opacity: 0;
  transform: scaleX(0.6);

  animation: lineIn 0.8s ease forwards;
  animation-delay: 0.6s;

  transition: 0.4s ease;
}

/* TEXTO */
.text {
  font-size: 12px;
  letter-spacing: 4.5px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;

  opacity: 0;
  transform: translateY(10px);

  animation: textIn 0.8s ease forwards;
  animation-delay: 0.9s;

  transition: 0.4s ease;
}

/* MICRO INTERAÇÃO */
.container:hover .logo {
  transform: scale(1.018);
  filter: brightness(1.1) contrast(1.06);
}

.container:hover .line {
  width: 80px;
  opacity: 0.8;
}

.container:hover .text {
  letter-spacing: 6px;
  color: #fff;
}

/* ANIMAÇÕES */
@keyframes logoIn {
  0% {
    opacity: 0;
    transform: translateY(60px) scale(0.94);
  }
  60% {
    opacity: 1;
    transform: translateY(-4px) scale(1.01);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes lineIn {
  to {
    opacity: 0.6;
    transform: scaleX(1);
  }
}

@keyframes textIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png" alt="INVUL Logo">

  <div class="line"></div>

  <div class="text">EM BREVE</div>

</div>

</body>
</html>
