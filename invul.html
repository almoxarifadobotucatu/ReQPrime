<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
}

/* CENTRALIZAÇÃO ÓPTICA */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(-3%);
  text-align: center;

  opacity: 0;
  animation: entrance 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* WRAPPER */
.logo-wrapper {
  position: relative;
}

/* LOGO */
.logo {
  width: 85vw;
  max-width: 1000px;
  display: block;
  position: relative;
  z-index: 2;
}

/* SHINE RECORTADO (AQUI MUDA TUDO) */
.shine {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.6) 50%,
    transparent 70%
  );

  transform: translateX(-120%) skewX(-20deg);

  /* máscara usando a própria logo */
  -webkit-mask-image: url("https://almoxarifadobotucatu.netlify.app/invul.png");
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-size: contain;
  -webkit-mask-position: center;

  mask-image: url("https://almoxarifadobotucatu.netlify.app/invul.png");
  mask-repeat: no-repeat;
  mask-size: contain;
  mask-position: center;

  pointer-events: none;
}

/* HOVER ATIVA O SHINE */
.logo-wrapper:hover .shine {
  animation: shineMove 0.9s ease forwards;
}

/* LINHA */
.line {
  width: 60px;
  height: 1px;
  margin-top: 14px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.5;
  transition: 0.4s;
}

/* TEXTO */
.text {
  font-size: 12px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  transition: 0.4s;
}

/* HOVER */
.container:hover .logo {
  transform: scale(1.02);
}

.container:hover .text {
  letter-spacing: 8px;
  color: #fff;
}

.container:hover .line {
  width: 100px;
}

/* ANIMAÇÕES */
@keyframes entrance {
  from {
    opacity: 0;
    transform: translateY(80px);
  }
  to {
    opacity: 1;
    transform: translateY(-3%);
  }
}

@keyframes shineMove {
  from {
    transform: translateX(-120%) skewX(-20deg);
  }
  to {
    transform: translateX(140%) skewX(-20deg);
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo-wrapper">
    <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">
    <div class="shine"></div>
  </div>

  <div class="line"></div>
  <div class="text">EM BREVE</div>

</div>

</body>
</html>
