<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: radial-gradient(circle at center, #0a0a0a 0%, #000 70%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
  overflow: hidden;
}

/* PARALLAX FUNDO SUAVE */
body::before {
  content: "";
  position: absolute;
  width: 140%;
  height: 140%;
  background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translate(-5%, -5%); }
  50% { transform: translate(5%, 5%); }
  100% { transform: translate(-5%, -5%); }
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  text-align: center;

  opacity: 0;
  transform: translateY(60px) scale(0.9);
  animation: entrance 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* LOGO GRANDE (AQUI É O PONTO PRINCIPAL) */
.logo {
  width: 720px;              /* 🔥 AUMENTADO */
  max-width: 92vw;           /* ocupa quase tudo no mobile */

  position: relative;

  filter: drop-shadow(0 0 0 rgba(255,255,255,0));
  transition: all 0.6s ease;
}

/* SHINE EFFECT */
.logo::after {
  content: "";
  position: absolute;
  top: 0;
  left: -60%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  transform: skewX(-20deg);
  animation: shine 4s infinite;
}

@keyframes shine {
  0% { left: -60%; }
  100% { left: 140%; }
}

/* LINHA */
.line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
  transition: 0.5s;
}

/* TEXTO */
.text {
  font-size: 13px;
  letter-spacing: 8px;
  opacity: 0.6;
  text-transform: uppercase;
  font-weight: 300;
  transition: 0.5s;
}

/* HOVER PREMIUM */
.container:hover .logo {
  transform: scale(1.05);
  filter: drop-shadow(0 0 25px rgba(255,255,255,0.25));
}

.container:hover .line {
  width: 140px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
}

.container:hover .text {
  opacity: 1;
  letter-spacing: 12px;
}

/* ENTRADA CINEMATOGRÁFICA */
@keyframes entrance {
  0% {
    opacity: 0;
    transform: translateY(80px) scale(0.85);
  }
  60% {
    opacity: 1;
    transform: translateY(-10px) scale(1.03);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* SCROLL REVEAL (se adicionar conteúdo depois) */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">

  <div class="line"></div>

  <div class="text">EM BREVE</div>

</div>

</body>
</html>
