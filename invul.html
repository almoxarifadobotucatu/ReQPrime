<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVUL</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

/* FUNDO PROFUNDO */
.bg {
  position: absolute;
  width: 120%;
  height: 120%;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.06), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04), transparent 60%);
  filter: blur(40px);
  transition: transform 0.2s ease-out;
}

/* VINHETA (efeito premium) */
.vignette {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9));
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;
  text-align: center;

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;

  opacity: 0;
  transform: translateY(80px) scale(0.9);
  animation: entrance 1.8s cubic-bezier(0.22,1,0.36,1) forwards;
}

/* LOGO HERO */
.logo-wrapper {
  position: relative;
  display: inline-block;
}

.logo {
  width: 85vw;
  max-width: 1100px;

  animation: breathe 5s ease-in-out infinite;
  transition: transform 0.4s ease;
}

/* GLOW */
.glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
  filter: blur(40px);
  opacity: 0.15;
  animation: glowPulse 4s ease-in-out infinite;
}

/* SHINE REAL */
.shine {
  position: absolute;
  top: 0;
  left: -80%;
  width: 40%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  transform: skewX(-20deg);
  animation: shineMove 5s infinite;
}

/* TEXTO */
.text {
  font-size: 14px;
  letter-spacing: 8px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  transition: 0.4s;
}

/* LINHA */
.line {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.6;
  transition: 0.4s;
}

/* HOVER */
.container:hover .logo {
  transform: scale(1.04);
}

.container:hover .text {
  letter-spacing: 12px;
  color: #fff;
}

.container:hover .line {
  width: 160px;
}

/* ANIMAÇÕES */
@keyframes entrance {
  0% {
    opacity: 0;
    transform: translateY(120px) scale(0.8);
  }
  60% {
    opacity: 1;
    transform: translateY(-15px) scale(1.03);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.015); }
}

@keyframes glowPulse {
  0%,100% { opacity: 0.1; }
  50% { opacity: 0.25; }
}

@keyframes shineMove {
  0% { left: -80%; }
  100% { left: 140%; }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="vignette"></div>

<div class="container">

  <div class="logo-wrapper">
    <div class="glow"></div>
    <img class="logo" src="https://almoxarifadobotucatu.netlify.app/invul.png">
    <div class="shine"></div>
  </div>

  <div class="line"></div>
  <div class="text">EM BREVE</div>

</div>

<script>
/* PARALLAX COM MOUSE */
const bg = document.getElementById("bg");

document.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;

  bg.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
